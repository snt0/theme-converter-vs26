name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore ThemeConverter/ThemeConverter.slnx
      - run: dotnet build ThemeConverter/ThemeConverter.slnx --configuration Release --no-restore
      - run: dotnet test ThemeConverter/ThemeConverterTests/ThemeConverterTests.csproj --configuration Release --no-build
      - name: Set package version
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
          "0.1.0-ci.$env:GITHUB_RUN_NUMBER"
          }
          "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV
      - run: dotnet pack ThemeConverter/ThemeConverter/ThemeConverter.csproj --configuration Release --no-build --output artifacts -p:Version=$env:PACKAGE_VERSION
      - run: dotnet tool install ThemeConverter.VS26 --add-source artifacts --tool-path .tool-smoke --version $env:PACKAGE_VERSION
      - run: .\.tool-smoke\theme-converter --help
      - uses: actions/upload-artifact@v7
        with:
          name: NuGet-package
          path: artifacts/*.nupkg

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: windows-latest
    environment: nuget
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: NuGet-package
      - name: NuGet login (OIDC ? temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: NuGet push
        run: dotnet nuget push *.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
